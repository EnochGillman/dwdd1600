<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Learn how to write shaders">
	<meta name="author" content="Enoch Gillman">
	<title>Raster Roster: Home</title>
	<link rel="stylesheet" href="rasterroster.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet">
	<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
	<!-- start the page header -->
	<header>
		<img src="images/logo.webp" alt="Raster Roster logo" width="128" height="128">
		<span>Raster Roster</span>
	</header>

	<!-- start the page navigation -->
	<nav>
		<ul>
			<li><a href="index.html">Home</a></li>
			<li><a href="tutorials.html">Tutorials</a></li>
			<li><a href="about.html">About</a></li>
			<li class="active"><a href="feedback.html">Feedback</a></li>
		</ul>

	</nav>

	<!-- start the main content -->
	<main>
		<h1>Feedback</h1>
		<p>Give the website feedback.</p>

		<form method="get" class="myForm" action="thanks.html">
			<fieldset>
				<legend>Personal Contact</legend>
				<label>First Name*<input type="text" name="fname" placeholder="John" required></label>
				<label>Last Name*<input type="text" name="lname" placeholder="Doe" required></label>
				<label>Email*<input type="email" name="email" placeholder="johndoe@email.com"
						required></label>
				<label>Phone<input type="tel" name="phone" placeholder="123-456-7890"></label>
			</fieldset>

			<fieldset>
				<legend>Which best describes you?</legend>
				<label><input type="radio" name="method" value="student">I want to learn more about
					shaders as a student.</label>
				<label><input type="radio" name="method" value="student">I want to learn more about
					shaders for my work.</label>
				<label><input type="radio" name="method" value="hobby">I want to learn more about
					shaders as a
					hobby.</label>
			</fieldset>

			<fieldset>
				<legend>Why did you come to the website?</legend>
				<label><input type="checkbox" name="learn" value="pipeline">To learn about the 3D
					graphics
					pipeline.</label>
				<label><input type="checkbox" name="reinforce" value="glsl">To learn about GLSL (OpenGL
					Shading Language).</label>
				<label><input type="checkbox" name="practice" value="webgl">To learn about
					WebGL.</label>

			</fieldset>

			<fieldset>
				<legend>What would you like to share?</legend>
				<label>What is the nature of your feedback?
					<select name="time" required>
						<option value="">Please Select</option>
						<option value="help">Ask for Help</option>
						<option value="critique">Give a Critique</option>
						<option value="gratitude">Give Thanks</option>
					</select>
				</label>
				<label>Feedback
					<textarea name="feedback" placeholder="Write your feedback here."
						required></textarea>
				</label>
			</fieldset>

			<input type="submit" value="Send Feedback">
		</form>

	</main>

	<!-- start the page footer -->
	<footer>
		<p>&copy; 2025 &bull; Enoch Gilman &bull; Web Essentials</p>

	</footer>

</body>

</html>
